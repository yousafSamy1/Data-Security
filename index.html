<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBER SHIELD PRO - Next-Gen Security Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0B0F19;
      --sidebar-bg: #070A10;
      --card-bg: #131C2E;
      --card-border: #1E293B;
      --accent-cyan: #00F0FF;
      --accent-purple: #A855F7;
      --success-green: #10B981;
      --text-bright: #F8FAFC;
      --text-muted: #94A3B8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-bright);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 20px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand h1 {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-cyan);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand p {
      font-size: 12px;
      color: #64748B;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      list-style: none;
    }

    .nav-btn {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background: var(--card-bg);
      color: var(--text-bright);
    }

    .nav-btn.active {
      background: var(--card-bg);
      color: var(--accent-cyan);
      border-left: 3px solid var(--accent-cyan);
    }

    .activity-log {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;

    }

    .activity-log h3 {
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      letter-spacing: 0.5px;
    }

    .log-box {
      flex: 1;
      background: #0B0F19;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 10px;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      color: var(--text-muted);
      overflow-y: auto;
    }

    .status-card {
      background: #0F172A;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      background-color: var(--success-green);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--success-green);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    .status-info h4 {
      font-size: 11px;
      font-weight: 700;
      color: var(--success-green);
    }

    .status-info p {
      font-size: 10px;
      color: #64748B;
    }

    /* MAIN CONTENT */
    .main-area {
      flex: 1;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title-box h2 {
      font-size: 24px;
      font-weight: 800;
    }

    .title-box span {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-purple);
      letter-spacing: 0.5px;
    }

    .mode-switcher {
      display: flex;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 4px;
      gap: 4px;
    }

    .mode-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: var(--accent-cyan);
      color: #042F2E;
    }

    /* CARDS & PANELS */
    .param-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .param-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .param-group label {
      font-size: 12px;
      font-weight: 700;
    }

    .input-field {
      background: #080C14;
      border: 1px solid var(--card-border);
      color: var(--text-bright);
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--accent-cyan);
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .io-panel {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .panel-stats {
      font-size: 11px;
      color: #64748B;
    }

    textarea {
      flex: 1;
      background: #080C14;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-bright);
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      padding: 12px;
      resize: none;
      outline: none;
    }

    textarea:focus {
      border-color: var(--card-border);
    }

    .output-box {
      color: #00FFB3;
      background: #050811;
    }

    /* ACTION BAR */
    .action-bar {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      flex: 1;
      background: var(--accent-cyan);
      color: #042F2E;
      border: none;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: #0891B2;
    }

    .btn-secondary {
      background: var(--card-border);
      color: var(--text-bright);
      border: none;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    .btn-small {
      background: #0B0F19;
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <h1>⚡ CYBER SHIELD</h1>
      <p>Pro Encryption Engine v3.0</p>
    </div>
    <ul class="nav-list">
      <li><button class="nav-btn active" onclick="selectTab('caesar')">🔑 Caesar Cipher</button></li>
      <li><button class="nav-btn" onclick="selectTab('columnar')">📊 Columnar Transposition</button></li>
      <li><button class="nav-btn" onclick="selectTab('affine')">📐 Affine Cipher</button></li>
      <li><button class="nav-btn" onclick="selectTab('rsa')">⚛️ RSA Cryptography</button></li>
    </ul>

    <div class="activity-log">
      <h3>ACTIVITY LOG</h3>
      <div class="log-box" id="logBox">[System] Vercel Cloud Core Ready.</div>
    </div>

    <div class="status-card">
      <div class="pulse-dot"></div>
      <div class="status-info">
        <h4>ENGINE ONLINE</h4>
        <p>Real-Time Cloud Cipher API</p>
      </div>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <main class="main-area">
    <header class="header-bar">
      <div class="title-box">
        <h2 id="tabTitle">Caesar Cipher</h2>
        <span id="tabBadge">CLASSICAL SYMMETRIC CIPHER • SHIFT VECTOR</span>
      </div>
      <div class="mode-switcher">
        <button class="mode-btn active" id="modeEnc" onclick="setMode('Encrypt')">🔒 Encrypt</button>
        <button class="mode-btn" id="modeDec" onclick="setMode('Decrypt')">🔓 Decrypt</button>
      </div>
    </header>

    <!-- DYNAMIC PARAMETER CARD -->
    <div class="param-card" id="paramCard">
      <!-- Generated via JS -->
    </div>

    <!-- WORKSPACE -->
    <div class="workspace">
      <!-- INPUT PANEL -->
      <div class="io-panel">
        <div class="panel-hdr">
          <span class="panel-title">INPUT PLAINTEXT / CIPHERTEXT</span>
          <span class="panel-stats" id="inputStats">0 chars | Entropy: 0.00 bits</span>
        </div>
        <textarea id="inputText" placeholder="Enter plaintext or ciphertext here..." oninput="updateInputStats()"></textarea>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="action-bar">
        <button class="btn-primary" id="runBtn" onclick="executeCipher()">⚡ EXECUTE & STREAM CIPHER</button>
        <button class="btn-secondary" onclick="swapInputOutput()">🔄 Swap Input/Result</button>
        <button class="btn-secondary" onclick="clearFields()">🗑️ Clear</button>
      </div>

      <!-- OUTPUT PANEL -->
      <div class="io-panel">
        <div class="panel-hdr">
          <span class="panel-title">OUTPUT CIPHER STREAM</span>
          <div style="display: flex; gap: 8px;">
            <select class="input-field" style="padding: 2px 6px; font-size: 11px;" id="fmtSelect" onchange="changeFormat()">
              <option value="Plain">Plain</option>
              <option value="HEX">HEX</option>
              <option value="Base64">Base64</option>
            </select>
            <button class="btn-small" onclick="copyResult()">📋 Copy Result</button>
          </div>
        </div>
        <textarea id="outputText" class="output-box" readonly placeholder="Result will appear here..."></textarea>
      </div>
    </div>
  </main>

  <script>
    let activeTab = 'caesar';
    let currentMode = 'Encrypt';
    let rawResult = '';

    const tabConfig = {
      caesar: { title: 'Caesar Cipher', badge: 'CLASSICAL SYMMETRIC CIPHER • SHIFT VECTOR' },
      columnar: { title: 'Columnar Transposition Cipher', badge: 'PERMUTATION TRANSPOSITION • KEY MATRIX' },
      affine: { title: 'Affine Cipher', badge: 'ALGEBRAIC MODULAR CIPHER • (a*x + b) mod 26' },
      rsa: { title: 'RSA Cryptography', badge: 'ASYMMETRIC PUBLIC KEY CRYPTOSYSTEM' }
    };

    function selectTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.nav-btn').forEach((btn, idx) => {
        btn.classList.toggle('active', ['caesar', 'columnar', 'affine', 'rsa'][idx] === tab);
      });
      document.getElementById('tabTitle').innerText = tabConfig[tab].title;
      document.getElementById('tabBadge').innerText = tabConfig[tab].badge;
      renderParams();
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('modeEnc').classList.toggle('active', mode === 'Encrypt');
      document.getElementById('modeDec').classList.toggle('active', mode === 'Decrypt');
    }

    function renderParams() {
      const card = document.getElementById('paramCard');
      if (activeTab === 'caesar') {
        card.innerHTML = `
          <div class="param-group">
            <label>Shift Value (0-25):</label>
            <input type="number" id="caesarShift" class="input-field" value="3" style="width: 80px;">
          </div>
        `;
      } else if (activeTab === 'columnar') {
        card.innerHTML = `
          <div class="param-group">
            <label>Key Word:</label>
            <input type="text" id="colKey" class="input-field" value="SECRET" style="width: 160px;">
          </div>
        `;
      } else if (activeTab === 'affine') {
        card.innerHTML = `
          <div class="param-group">
            <label>Multiplier A (coprime to 26):</label>
            <input type="number" id="affA" class="input-field" value="5" style="width: 70px;">
          </div>
          <div class="param-group">
            <label>Shift B:</label>
            <input type="number" id="affB" class="input-field" value="8" style="width: 70px;">
          </div>
        `;
      } else if (activeTab === 'rsa') {
        card.innerHTML = `
          <div class="param-group"><label>Prime p:</label><input type="number" id="rsaP" class="input-field" value="61" style="width: 70px;"></div>
          <div class="param-group"><label>Prime q:</label><input type="number" id="rsaQ" class="input-field" value="53" style="width: 70px;"></div>
          <div class="param-group"><label>Exponent e:</label><input type="number" id="rsaE" class="input-field" value="17" style="width: 70px;"></div>
          <button class="btn-small" onclick="fillRSADemo()">⚡ Auto Primes</button>
        `;
      }
    }

    function fillRSADemo() {
      document.getElementById('rsaP').value = 61;
      document.getElementById('rsaQ').value = 53;
      document.getElementById('rsaE').value = 17;
    }

    function updateInputStats() {
      const text = document.getElementById('inputText').value;
      const count = text.length;
      let entropy = 0;
      if (count > 0) {
        const freq = {};
        for (let c of text) freq[c] = (freq[c] || 0) + 1;
        for (let c in freq) {
          let p = freq[c] / count;
          entropy -= p * Math.log2(p);
        }
      }
      document.getElementById('inputStats').innerText = `${count} chars | Entropy: ${entropy.toFixed(2)} bits/symbol`;
    }

    async function executeCipher() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) {
        alert('Please enter a message to process.');
        return;
      }

      let payload = { text, mode: currentMode };
      let endpoint = `/api/${activeTab}`;

      if (activeTab === 'caesar') payload.shift = parseInt(document.getElementById('caesarShift').value) || 3;
      else if (activeTab === 'columnar') payload.key = document.getElementById('colKey').value || 'SECRET';
      else if (activeTab === 'affine') {
        payload.a = parseInt(document.getElementById('affA').value) || 5;
        payload.b = parseInt(document.getElementById('affB').value) || 8;
      } else if (activeTab === 'rsa') {
        payload.p = parseInt(document.getElementById('rsaP').value) || 61;
        payload.q = parseInt(document.getElementById('rsaQ').value) || 53;
        payload.e = parseInt(document.getElementById('rsaE').value) || 17;
      }

      const runBtn = document.getElementById('runBtn');
      runBtn.innerText = '⏳ PROCESSING STREAM...';
      runBtn.disabled = true;

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Calculation failed');

        rawResult = data.result;
        animateScramble(data.result);
        logActivity(`${activeTab.toUpperCase()} ${currentMode} [${text.length}ch]`);
      } catch (err) {
        document.getElementById('outputText').value = `⚠️ Error: ${err.message}`;
      } finally {
        runBtn.innerText = '⚡ EXECUTE & STREAM CIPHER';
        runBtn.disabled = false;
      }
    }

    function animateScramble(finalText) {
      const chars = '!@#$%^&*()_+-=[]{}|;:,.<>?/~0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      let step = 0;
      const totalSteps = 10;
      const interval = setInterval(() => {
        if (step >= totalSteps) {
          document.getElementById('outputText').value = finalText;
          clearInterval(interval);
          return;
        }
        let scrambled = '';
        let revealCount = Math.floor((step / totalSteps) * finalText.length);
        for (let i = 0; i < finalText.length; i++) {
          if (finalText[i] === '\n' || finalText[i] === ' ' || i < revealCount) scrambled += finalText[i];
          else scrambled += chars[Math.floor(Math.random() * chars.length)];
        }
        document.getElementById('outputText').value = scrambled;
        step++;
      }, 35);
    }

    function changeFormat() {
      const fmt = document.getElementById('fmtSelect').value;
      if (!rawResult) return;
      if (fmt === 'HEX') {
        let hex = Array.from(rawResult).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
        document.getElementById('outputText').value = `HEX STREAM:\n${hex.toUpperCase()}`;
      } else if (fmt === 'Base64') {
        document.getElementById('outputText').value = `BASE64 STREAM:\n${btoa(rawResult)}`;
      } else {
        document.getElementById('outputText').value = rawResult;
      }
    }

    function copyResult() {
      const text = document.getElementById('outputText').value;
      if (text) {
        navigator.clipboard.writeText(text);
        alert('Copied to clipboard!');
      }
    }

    function swapInputOutput() {
      const out = document.getElementById('outputText').value;
      if (out && !out.startsWith('⚠️')) {
        document.getElementById('inputText').value = out;
        setMode(currentMode === 'Encrypt' ? 'Decrypt' : 'Encrypt');
        updateInputStats();
      }
    }

    function clearFields() {
      document.getElementById('inputText').value = '';
      document.getElementById('outputText').value = '';
      rawResult = '';
      updateInputStats();
    }

    function logActivity(msg) {
      const time = new Date().toLocaleTimeString();
      const log = document.getElementById('logBox');
      log.innerText += `\n[${time}] ${msg}`;
      log.scrollTop = log.scrollHeight;
    }

    // Init
    renderParams();
  </script>
</body>
</html>
